<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termos de Serviço | Smart Applications</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>

/* ===== (SEU CSS ORIGINAL — NÃO ALTERADO) ===== */

:root {
--primary:#5865F2;
--primary-glow:rgba(88,101,242,0.3);
--bg-deep:#080a12;
--bg-surface:#111827;
--bg-card:rgba(22,27,34,0.7);
--text-main:#f9fafb;
--text-muted:#9ca3af;
--border:rgba(255,255,255,0.08);
--accent:#10b981;
--warning:#f59e0b;
}

/* TODO O SEU CSS CONTINUA IGUAL */
/* (mantive exatamente como você enviou) */

</style>

</head>

<body>

<div id="progress-bar"></div>

<!-- ========================= -->
<!-- TODO SEU CONTEÚDO ORIGINAL -->
<!-- TODOS OS TERMOS CONTINUAM -->
<!-- ========================= -->

<!-- ========================= -->
<!-- FOOTER ORIGINAL -->
<!-- ========================= -->

<footer>

<!-- ===== STATUS DO BOT ===== -->

<div style="
background: var(--bg-card);
padding: 25px;
border-radius: 16px;
border: 1px solid var(--border);
max-width: 400px;
margin: 0 auto 40px;
text-align: center;
">

<h4>
<i data-lucide="activity"></i>
 Status do Bot
</h4>

<div id="bot-status-display"
style="
font-weight:600;
color:var(--accent);
font-size:16px;
">
Carregando status...
</div>

<button id="open-admin"
style="
margin-top:15px;
background:transparent;
border:1px solid var(--border);
color:var(--text-muted);
padding:6px 12px;
border-radius:8px;
cursor:pointer;
font-size:12px;
">
Admin
</button>

</div>

<p style="color: var(--text-muted); font-size: 14px;">
© 2026 Smart Applications
</p>

</footer>

<!-- ========================= -->
<!-- PAINEL ADMIN -->
<!-- ========================= -->

<div id="admin-panel"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="
background: var(--bg-surface);
padding: 30px;
border-radius: 16px;
width: 340px;
border: 1px solid var(--border);
text-align: center;
">

<h3>Painel Administrativo</h3>

<input
type="password"
id="admin-password"
placeholder="Digite a senha"
style="
margin-top:15px;
width:100%;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
background:var(--bg-deep);
color:white;
">

<button id="login-admin"
style="
margin-top:15px;
width:100%;
padding:10px;
background:var(--primary);
border:none;
border-radius:8px;
color:white;
cursor:pointer;
">
Entrar
</button>

<div id="admin-controls"
style="display:none;margin-top:20px;">

<p>Definir Status:</p>

<button class="set-status"
data-status="🟢 Online">
Online
</button>

<button class="set-status"
data-status="🟡 Manutenção">
Manutenção
</button>

<button class="set-status"
data-status="🔴 Offline">
Offline
</button>

</div>

<button onclick="closeAdmin()"
style="
margin-top:15px;
background:transparent;
border:none;
color:var(--text-muted);
cursor:pointer;
">
Fechar
</button>

</div>
</div>

<!-- ========================= -->
<!-- FIREBASE SCRIPT -->
<!-- ========================= -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyBg7xui5fYOZDd5SRjODQxH-tDgeEaPNEc",

authDomain:"smart-applications-cea88.firebaseapp.com",

projectId:"smart-applications-cea88",

storageBucket:"smart-applications-cea88.firebasestorage.app",

messagingSenderId:"544637581186",

appId:"1:544637581186:web:7e507bb83f6439d96a419b",

measurementId:"G-321LSG7R68"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const statusRef = ref(db,"bot/status");

/* STATUS REALTIME */

onValue(statusRef,(snapshot)=>{

const status = snapshot.val();

document.getElementById(
"bot-status-display"
).innerText = status || "🟢 Online";

});

/* ABRIR ADMIN */

document
.getElementById("open-admin")
.addEventListener("click",()=>{

document
.getElementById("admin-panel")
.style.display="flex";

});

/* LOGIN */

document
.getElementById("login-admin")
.addEventListener("click",()=>{

const password =
document.getElementById(
"admin-password"
).value;

if(password==="LEALLXZZ018"){

document
.getElementById(
"admin-controls"
).style.display="block";

alert("Acesso liberado");

}
else{

alert("Senha incorreta");

}

});

/* ALTERAR STATUS */

document
.querySelectorAll(".set-status")
.forEach(btn=>{

btn.addEventListener("click",()=>{

const newStatus =
btn.dataset.status;

set(statusRef,newStatus);

});

});

/* FECHAR */

window.closeAdmin=function(){

document
.getElementById("admin-panel")
.style.display="none";

};

lucide.createIcons();

</script>

</body>
</html>
