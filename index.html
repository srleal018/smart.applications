<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Applications</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

header{
padding:40px;
text-align:center;
background:#020617;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#5865F2;
color:white;
cursor:pointer;
margin-top:10px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
background:#111827;
color:white;
}

#adminPanel{
display:none;
padding:30px;
background:#020617;
margin:40px;
border-radius:16px;
}

.section{
margin-bottom:30px;
}

.card{
background:#111827;
padding:15px;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<h1>Smart Applications</h1>

<p>Painel inteligente com login Google</p>

<button id="googleLogin">

Login com Google

</button>

</header>



<!-- PAINEL ADMIN -->

<div id="adminPanel">

<h2>Painel Administrativo</h2>

<button id="logoutBtn">

Sair

</button>



<!-- BANCOS -->

<div class="section">

<h3>Bancos</h3>

<input id="bancoNome"
placeholder="Nome do banco">

<textarea id="bancoInfo"
placeholder="Informações"></textarea>

<button id="addBanco">

Salvar Banco

</button>

<div id="listaBancos"></div>

</div>



<!-- TERMOS -->

<div class="section">

<h3>Termos</h3>

<input id="termoTitulo"
placeholder="Título">

<textarea id="termoTexto"
placeholder="Texto"></textarea>

<button id="addTermo">

Salvar Termo

</button>

<div id="listaTermos"></div>

</div>



<!-- REGRAS -->

<div class="section">

<h3>Regras</h3>

<input id="regraTitulo"
placeholder="Título">

<textarea id="regraTexto"
placeholder="Texto"></textarea>

<button id="addRegra">

Salvar Regra

</button>

<div id="listaRegras"></div>

</div>



<!-- SUPORTE -->

<div class="section">

<h3>Suporte</h3>

<input id="suporteTitulo"
placeholder="Título">

<textarea id="suporteTexto"
placeholder="Texto"></textarea>

<button id="addSuporte">

Salvar Suporte

</button>

<div id="listaSuporte"></div>

</div>

</div>



<!-- FIREBASE SCRIPT -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
addDoc,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



/* CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyBg7xui5fYOZDd5SRjODQxH-tDgeEaPNEc",

authDomain: "smart-applications-cea88.firebaseapp.com",

projectId: "smart-applications-cea88",

storageBucket: "smart-applications-cea88.firebasestorage.app",

messagingSenderId: "544637581186",

appId: "1:544637581186:web:7e507bb83f6439d96a419b",

measurementId: "G-321LSG7R68"

};



/* INIT */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const provider =
new GoogleAuthProvider();



/* LOGIN */

document
.getElementById("googleLogin")
.onclick = async ()=>{

try{

const result =
await signInWithPopup(auth,provider);

const user = result.user;

console.log("UID:",user.uid);

verificarAdmin(user.uid);

}catch(e){

alert("Erro login");

console.error(e);

}

};



/* ADMIN CHECK */

async function verificarAdmin(uid){

const ref =
doc(db,"admins",uid);

const snap =
await getDoc(ref);

if(snap.exists()){

document
.getElementById("adminPanel")
.style.display="block";

carregarDados();

alert("Admin liberado");

}else{

alert("Login normal");

}

}



/* LOGOUT */

document
.getElementById("logoutBtn")
.onclick = ()=>{

signOut(auth);

location.reload();

};



/* FUNÇÃO GENERICA */

async function salvar(nome, campo1, campo2){

const v1 =
document
.getElementById(campo1)
.value;

const v2 =
document
.getElementById(campo2)
.value;

if(!v1) return;

await addDoc(

collection(db,nome),

{

titulo:v1,

texto:v2,

criado:new Date()

}

);

carregarDados();

}



/* BOTÕES */

document
.getElementById("addBanco")
.onclick=()=>{

salvar("bancos",
"bancoNome",
"bancoInfo")

};

document
.getElementById("addTermo")
.onclick=()=>{

salvar("termos",
"termoTitulo",
"termoTexto")

};

document
.getElementById("addRegra")
.onclick=()=>{

salvar("regras",
"regraTitulo",
"regraTexto")

};

document
.getElementById("addSuporte")
.onclick=()=>{

salvar("suporte",
"suporteTitulo",
"suporteTexto")

};



/* CARREGAR */

async function carregarDados(){

await carregar("bancos","listaBancos");

await carregar("termos","listaTermos");

await carregar("regras","listaRegras");

await carregar("suporte","listaSuporte");

}



async function carregar(nome,id){

const lista =
document.getElementById(id);

lista.innerHTML="";

const query =
await getDocs(
collection(db,nome)
);

query.forEach(docu=>{

const data =
docu.data();

const div =
document.createElement("div");

div.className="card";

div.innerHTML=

"<strong>"+data.titulo+"</strong><br>"+data.texto;

lista.appendChild(div);

});

}

</script>

</body>

</html>
